server:
  port: 8080

spring:
  profiles:
    active: dev
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:NOT_CONFIGURED}
            client-secret: ${GOOGLE_CLIENT_SECRET:NOT_CONFIGURED}
            scope: email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:NOT_CONFIGURED}
            client-secret: ${FACEBOOK_CLIENT_SECRET:NOT_CONFIGURED}
            scope: email, public_profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v18.0/me?fields=id,name,email,picture
            user-name-attribute: id
  datasource:
    url: jdbc:postgresql://localhost:5432/aitasker1
    username: postgres
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB

app:
  upload:
    dir: uploads
  jwt:
    secret: "aItAsKeR_jWt_SeCrEt_KeY_2024_CHANGE_THIS_IN_PRODUCTION"
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:5174
  ai:
    anthropic-api-key: "dummy-key"
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}