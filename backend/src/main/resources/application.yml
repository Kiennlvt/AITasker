server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/aitasker_db
    username: aitasker
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: aItAsKeR_jWt_SeCrEt_KeY_2024_CHANGE_THIS_IN_PRODUCTION
    expiration-ms: 86400000        # 24h
    refresh-expiration-ms: 604800000  # 7d
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
